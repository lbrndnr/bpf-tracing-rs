[package]
name = "bpf_tracing"
version = "0.0.1"
edition = "2024"
license = "GPL-3.0"
authors = [
    "lbrndnr <mail@laurinbrandner.ch>",
]
description = "An eBPF tracing facility that integrates neatly into Rust's tracing"
repository = "https://github.com/lbrndnr/bpf-tracing-rs"
readme = "../README.md"
keywords = ["ebpf", "bpf", "libbpf", "tracing", "logging"]

[dependencies]
nix = { version = "0.31.2", features = ["fs"] }
tracing = "0.1.44"

[build-dependencies]
libbpf-cargo = "0.26.1"
bpf-tracing-include = { path = "../bpf-tracing-include", version = "0.0.1" }
