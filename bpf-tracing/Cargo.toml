[package]
name = "bpf-tracing"
version = "0.0.2"
edition = "2024"
description = "An eBPF tracing facility that integrates neatly into Rust's tracing"
license.workspace = true
authors.workspace = true
repository.workspace = true
readme.workspace = true
keywords.workspace = true

[dependencies]
nix = { version = "0.31.2", features = ["fs"] }
tracing = "0.1.44"

[build-dependencies]
libbpf-cargo = "0.26.1"
bpf-tracing-include = { path = "../bpf-tracing-include", version = "0.0.1" }
